<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essential Links for Statistical Programmers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#1A2744;--teal:#0A8F9E;--amber:#E8943A;
--bg:#F0F2F5;--card:#FFFFFF;--text:#2D3748;--mid:#5A6578;--light:#E2E8F0;
--shadow:0 2px 8px rgba(26,39,68,0.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--teal);text-decoration:none;transition:color 0.15s}
a:hover{color:var(--navy);text-decoration:underline}

.header{background:var(--navy);padding:2rem 1.5rem 1.5rem;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto}
.header h1{color:#fff;font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.2rem}
.header p{color:var(--teal);font-size:0.85rem;font-weight:500}
.header .author{color:rgba(255,255,255,0.5);font-size:0.75rem;margin-top:0.5rem}

.search-wrap{max-width:1100px;margin:-24px auto 0;padding:0 1.5rem;position:relative;z-index:101}
.search-box{
background:var(--card);border:2px solid transparent;border-radius:12px;
padding:14px 18px 14px 48px;width:100%;font-size:1rem;font-family:'DM Sans',sans-serif;
box-shadow:0 4px 20px rgba(26,39,68,0.12);transition:border-color 0.2s;outline:none;color:var(--text)
}
.search-box:focus{border-color:var(--teal)}
.search-box::placeholder{color:var(--mid)}
.search-icon{position:absolute;left:calc(1.5rem + 16px);top:50%;transform:translateY(-50%);color:var(--mid);pointer-events:none}

.stats{max-width:1100px;margin:1rem auto 0;padding:0 1.5rem;display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap}
.stat-pill{
background:var(--card);padding:6px 14px;border-radius:20px;font-size:0.78rem;
color:var(--mid);font-weight:500;box-shadow:var(--shadow)
}
.stat-pill strong{color:var(--teal)}

.filters{max-width:1100px;margin:1rem auto 0;padding:0 1.5rem;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
background:var(--card);border:1.5px solid var(--light);border-radius:8px;
padding:7px 14px;font-size:0.78rem;font-family:'DM Sans',sans-serif;font-weight:500;
color:var(--mid);cursor:pointer;transition:all 0.15s;white-space:nowrap
}
.filter-btn:hover{border-color:var(--teal);color:var(--teal)}
.filter-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}

.content{max-width:1100px;margin:1.5rem auto 3rem;padding:0 1.5rem}
.category-header{
font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
color:var(--teal);margin:1.5rem 0 0.5rem;padding-left:4px
}
.category-header:first-child{margin-top:0}

.card{
background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:8px;
box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:flex-start;
gap:12px;transition:transform 0.1s,box-shadow 0.15s;border-left:3px solid transparent
}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,39,68,0.12);border-left-color:var(--teal)}
.card-main{flex:1;min-width:0}
.card-title{font-weight:600;font-size:0.95rem;color:var(--navy);margin-bottom:2px}
.card-desc{font-size:0.82rem;color:var(--mid);line-height:1.45}
.card-links{display:flex;gap:8px;flex-shrink:0;align-items:center;margin-top:2px}
.card-link{
font-size:0.72rem;font-family:'JetBrains Mono',monospace;font-weight:500;
background:rgba(10,143,158,0.08);padding:4px 10px;border-radius:6px;color:var(--teal);
transition:background 0.15s;white-space:nowrap
}
.card-link:hover{background:rgba(10,143,158,0.18);text-decoration:none}
.card-link.alt{background:rgba(232,148,58,0.1);color:var(--amber)}
.card-link.alt:hover{background:rgba(232,148,58,0.2)}
.card-sheet{
font-size:0.65rem;background:var(--bg);padding:2px 8px;border-radius:4px;
color:var(--mid);font-weight:500;display:inline-block;margin-top:4px
}

.no-results{text-align:center;padding:3rem 1rem;color:var(--mid)}
.no-results h3{font-size:1.1rem;color:var(--navy);margin-bottom:0.5rem}

.footer{text-align:center;padding:2rem;color:var(--mid);font-size:0.75rem;border-top:1px solid var(--light);margin-top:2rem}

.highlight{background:rgba(10,143,158,0.15);border-radius:2px;padding:0 1px}

@media(max-width:640px){
.header h1{font-size:1.2rem}
.card{flex-direction:column;gap:8px}
.card-links{align-self:flex-start}
.filters{gap:6px}
.filter-btn{padding:6px 10px;font-size:0.72rem}
}
</style>
</head>

const sheets = [...new Set(DATA.map(d => d.sheet))];
let activeSheet = null;
let searchTerm = '';

function init() {
  renderFilters();
  renderStats();
  renderContent();
  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase().trim();
    renderContent();
    renderStats();
  });
}

function renderFilters() {
  const el = document.getElementById('filters');
  const allBtn = `<button class="filter-btn active" data-sheet="all">All (${DATA.length})</button>`;
  const btns = sheets.map(s => {
    const count = DATA.filter(d => d.sheet === s).length;
    const short = s.replace('&amp;', '&').replace(' & ', ' & ');
    return `<button class="filter-btn" data-sheet="${s}">${short} (${count})</button>`;
  }).join('');
  el.innerHTML = allBtn + btns;
  el.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const sheet = e.target.dataset.sheet;
    activeSheet = sheet === 'all' ? null : sheet;
    renderContent();
    renderStats();
  });
}

function getFiltered() {
  let items = DATA;
  if (activeSheet) items = items.filter(d => d.sheet === activeSheet);
  if (searchTerm) {
    items = items.filter(d =>
      d.resource.toLowerCase().includes(searchTerm) ||
      d.description.toLowerCase().includes(searchTerm) ||
      d.category.toLowerCase().includes(searchTerm) ||
      d.sheet.toLowerCase().includes(searchTerm)
    );
  }
  return items;
}

function renderStats() {
  const filtered = getFiltered();
  const cats = new Set(filtered.map(d => d.category));
  const sheetsUsed = new Set(filtered.map(d => d.sheet));
  document.getElementById('stats').innerHTML = `
    <span class="stat-pill"><strong>${filtered.length}</strong> resources</span>
    <span class="stat-pill"><strong>${sheetsUsed.size}</strong> sections</span>
    <span class="stat-pill"><strong>${cats.size}</strong> categories</span>
  `;
}

function hl(text) {
  if (!searchTerm) return text;
  const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

function renderContent() {
  const el = document.getElementById('content');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    el.innerHTML = `<div class="no-results"><h3>No results found</h3><p>Try a different search term or clear the filter.</p></div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(d => {
    const key = d.sheet + '|||' + d.category;
    if (!grouped[key]) grouped[key] = { sheet: d.sheet, category: d.category, items: [] };
    grouped[key].items.push(d);
  });

  let html = '';
  Object.values(grouped).forEach(group => {
    html += `<div class="category-header">${hl(group.category)}</div>`;
    group.items.forEach(item => {
      const altHtml = item.altLink ? `<a class="card-link alt" href="${item.altLink}" target="_blank" rel="noopener">Alt Link</a>` : '';
      html += `
        <div class="card">
          <div class="card-main">
            <div class="card-title">${hl(item.resource)}</div>
            <div class="card-desc">${hl(item.description)}</div>
            <span class="card-sheet">${item.sheet}</span>
          </div>
          <div class="card-links">
            <a class="card-link" href="${item.link}" target="_blank" rel="noopener">Open</a>
            ${altHtml}
          </div>
        </div>`;
    });
  });

  el.innerHTML = html;
}

init();
</script>
</body>
</html>
